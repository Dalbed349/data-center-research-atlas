[build]
  base = "visualizer"
  command = "npm run build"
  publish = "out"

# This rule is essential for single-page applications.
# It tells Netlify to serve the index.html file for any path that doesn't match an existing file.
# This allows the Next.js router to handle all page navigation on the client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
